name: Build & Deploy to K3s

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cristinazhang
  K3S_HOST: 47.96.135.190
  K3S_USER: root

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-backend:${{ github.sha }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-frontend:${{ github.sha }}

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.K3S_HOST }}
          username: ${{ env.K3S_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl create namespace new-concept --dry-run=client -o yaml | kubectl apply -f -

            # Backend deployment
            kubectl set image deployment/nce-backend \
              backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-backend:${{ github.sha }} \
              -n new-concept --record

            # Frontend deployment
            kubectl set image deployment/nce-frontend \
              frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-frontend:${{ github.sha }} \
              -n new-concept --record

            # Create PVC if needed
            kubectl apply -f - <<EOF
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: nce-backend-data
              namespace: new-concept
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
              storageClassName: local-path
            EOF

            kubectl rollout status deployment/nce-backend -n new-concept --timeout=120s || echo "Rollout status check failed"
            kubectl rollout status deployment/nce-frontend -n new-concept --timeout=120s || echo "Rollout status check failed"

            echo "=== Deploy complete ==="
            echo "Access at: http://${{ env.K3S_HOST }}"
