name: Build & Deploy to K3s

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cristinazhang
  K3S_HOST: 47.96.135.190
  K3S_USER: root

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-backend:${{ github.sha }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-frontend:${{ github.sha }}

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.K3S_HOST }}
          username: ${{ env.K3S_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            kubectl create namespace new-concept --dry-run=client -o yaml | kubectl apply -f -

            # Create/update ImagePullSecret for GHCR
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=${{ env.REGISTRY }} \
              --docker-username=CristinaZhang \
              --docker-password="${{ secrets.GHCR_PAT }}" \
              -n new-concept \
              --dry-run=client -o yaml | kubectl apply -f -

            # Backend deployment
            kubectl apply -f - <<EOF
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: nce-backend
              namespace: new-concept
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: nce-backend
              template:
                metadata:
                  labels:
                    app: nce-backend
                spec:
                  imagePullSecrets:
                  - name: ghcr-secret
                  containers:
                  - name: backend
                    image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-backend:${{ github.sha }}
                    ports:
                    - containerPort: 8000
                    env:
                    - name: DATABASE_URL
                      value: sqlite:///./data/nce.db
                    - name: CORS_ORIGINS
                      value: "http://${{ env.K3S_HOST }}"
                    resources:
                      requests:
                        memory: "128Mi"
                        cpu: "100m"
                      limits:
                        memory: "256Mi"
                        cpu: "250m"
                    volumeMounts:
                    - name: data
                      mountPath: /app/data
                  volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: nce-backend-data
            EOF

            # Frontend deployment
            kubectl apply -f - <<EOF
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: nce-frontend
              namespace: new-concept
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: nce-frontend
              template:
                metadata:
                  labels:
                    app: nce-frontend
                spec:
                  imagePullSecrets:
                  - name: ghcr-secret
                  containers:
                  - name: frontend
                    image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nce-frontend:${{ github.sha }}
                    ports:
                    - containerPort: 80
                    resources:
                      requests:
                        memory: "64Mi"
                        cpu: "50m"
                      limits:
                        memory: "128Mi"
                        cpu: "100m"
            EOF

            # PVC
            kubectl apply -f - <<EOF
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: nce-backend-data
              namespace: new-concept
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
              storageClassName: local-path
            EOF

            kubectl rollout status deployment/nce-backend -n new-concept --timeout=120s || echo "Rollout check failed"
            kubectl rollout status deployment/nce-frontend -n new-concept --timeout=120s || echo "Rollout check failed"

            echo "=== Deploy complete ==="
            echo "Access at: http://${{ env.K3S_HOST }}"
